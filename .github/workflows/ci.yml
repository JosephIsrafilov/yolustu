name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: backend/requirements.txt
    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest httpx ruff mypy
    - name: Run Ruff Linter & Formatter
      run: |
        cd backend
        ruff check .
        ruff format --check .
    - name: Run Mypy Type Checker
      run: |
        cd backend
        mypy . --ignore-missing-imports
    - name: Run tests
      run: |
        cd backend
        pytest

  backend-migrations:
    runs-on: ubuntu-latest
    services:
      postgis:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_USER: yolustu_user
          POSTGRES_PASSWORD: yolustu_password
          POSTGRES_DB: yolustu_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U yolustu_user -d yolustu_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://yolustu_user:yolustu_password@127.0.0.1:5432/yolustu_db
      SECRET_KEY: ci-migrations-secret-key
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: backend/requirements.txt
    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Enable PostGIS
      run: |
        docker exec "${{ job.services.postgis.id }}" psql -U yolustu_user -d yolustu_db -c "CREATE EXTENSION IF NOT EXISTS postgis;"
    - name: Run Alembic migrations
      run: |
        cd backend
        python -m alembic upgrade head

  backend-docker-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build backend image
      run: docker build ./backend

  frontend-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    - name: Install dependencies
      run: |
        cd frontend
        npm ci
    - name: Lint
      run: |
        cd frontend
        npm run lint
    - name: Type check
      run: |
        cd frontend
        npm run typecheck
    - name: Build
      run: |
        cd frontend
        npm run build

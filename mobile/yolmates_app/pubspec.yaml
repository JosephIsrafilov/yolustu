name: yolmates_app
description: Yolmates - Modern carpooling app for Azerbaijan
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  go_router: ^14.6.2
  flutter_riverpod: ^2.6.1
  dio: ^5.9.0
  flutter_secure_storage: ^9.2.2
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  web_socket_channel: ^3.0.1
  google_maps_flutter: ^2.17.1
  image_picker: ^1.2.2
  record: ^7.1.0
  path_provider: ^2.1.5
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png

name: yolmates_app
description: Yolmates - Modern carpooling app for Azerbaijan
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  go_router: ^14.6.2
  flutter_riverpod: ^2.6.1
  firebase_core: ^3.15.1
  firebase_messaging: ^15.2.7
  dio: ^5.9.0
  flutter_secure_storage: ^9.2.2
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  web_socket_channel: ^3.0.1
  google_maps_flutter: ^2.17.1
  google_maps_flutter_android: ^2.19.10
  google_maps_flutter_platform_interface: ^2.15.0
  image_picker: ^1.2.2
  record: 6.2.1
  path_provider: ^2.1.5
  url_launcher: ^6.3.2
  flutter_localizations:
    sdk: flutter
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  google_api_availability: ^5.0.1
  path: ^1.9.1
  http_parser: ^4.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  http_mock_adapter: ^0.6.1

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png

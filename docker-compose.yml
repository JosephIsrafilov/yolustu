services:
  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://yolustu_user:yolustu_password@db:5432/yolustu_db
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    restart: unless-stopped

  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_USER: yolustu_user
      POSTGRES_PASSWORD: yolustu_password
      POSTGRES_DB: yolustu_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
